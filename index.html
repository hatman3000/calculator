<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: yellow;
      }
      .ab {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 50px;
        height: 100vh;
      }
      .screen span {
        font-size: 72px;
      }
      .abc button {
        padding: 10px 20px;
      }
      .pindutan button:not(:last-of-type) {
        padding: 5px 10px;
      }
      .pindutan button:last-of-type {
        background-color: pink;
        padding: 30px 50px;
        border: 9px solid red;
        border-radius: 15px 2px 15px 2px;
        transition: 0.7s;
      }
      .pindutan button:last-of-type:hover {
        background-color: blue;
        border: 9px solid violet;
        border-radius: 15px 2px 15px 2px;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="ab">
      <div class="screen"><span>0</span></div>
      <div class="abc">
        <button value="1">1</button>
        <button value="2">2</button>
        <button value="3">3</button>
        <button value="4">4</button>
        <button value="5">5</button>
        <button value="6">6</button>
        <button value="7">7</button>
        <button value="8">8</button>
        <button value="9">9</button>
        <button value="0">0</button>
      </div>
      <div class="pindutan">
        <button value="+">add</button>
        <button value="-">minus</button>
        <button value="/">divide</button>
        <button value="*">multiply</button>
        <button value="=">=</button>
      </div>
    </div>

    <script>
      let buttons = document.querySelectorAll(".abc button");
      let screen = document.querySelector(".screen span");
      let operations = document.querySelectorAll(
        ".pindutan button:not(:last-of-type)",
      );
      let equal = document.querySelector(".pindutan button:last-of-type");

      let numOne = "";
      let operator = "";

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          if (screen.textContent === "0") {
            screen.textContent = this.value;
          } else {
            screen.textContent += this.value;
          }
        });
      });

      operations.forEach(function (button) {
        button.addEventListener("click", function () {
          numOne = screen.textContent;  
          operator = this.value;  
          screen.textContent = "0";
        });
      });

      equal.addEventListener("click", function () {
        let numTwo = screen.textContent;
        let result = eval(numOne + operator + numTwo);
        screen.textContent = result;
        numOne = "";
        operator = "";
      });
    </script>
  </body>
</html>
